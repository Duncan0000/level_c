<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>C級運動按摩 學科測驗</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap');

        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #FDF6E3;
        }

        /* 馬卡龍色系 - 針對運動按摩調整一點活力感 */
        .macaron-pink { background-color: #FFB7B2; }
        .macaron-green { background-color: #B5EAD7; }
        .macaron-purple { background-color: #C7CEEA; }
        .macaron-yellow { background-color: #FFFFB5; }
        .macaron-blue { background-color: #A0E7E5; }
        
        .option-card {
            transition: all 0.2s ease;
            cursor: pointer;
            border: 2px solid transparent;
        }

        .option-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .option-card.selected {
            border-color: #FF9AA2;
            background-color: #FFF0F0;
        }

        .btn-nav {
            transition: transform 0.1s;
        }
        .btn-nav:active {
            transform: scale(0.95);
        }
        
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-2 md:p-4">

    <div id="app" class="w-full max-w-4xl bg-white rounded-3xl shadow-2xl overflow-hidden min-h-[700px] flex flex-col relative border-8 border-[#FFDAC1]">
        
        <!-- Header -->
        <div id="quiz-header" class="hidden bg-[#FFDAC1] p-4 flex justify-between items-center sticky top-0 z-10">
            <h2 class="text-xl font-bold text-gray-700">Q <span id="current-question-num">1</span> / <span id="total-question-num">10</span></h2>
            <div class="bg-white px-4 py-2 rounded-full shadow-sm text-lg font-mono font-bold text-[#FF9AA2] flex items-center gap-2">
                ⏱️ <span id="timer">00:00</span>
            </div>
        </div>

        <!-- 1. Start Screen -->
        <div id="start-screen" class="flex-1 flex flex-col items-center justify-center p-8 text-center bg-gradient-to-b from-white to-[#FFF5E6]">
            <h1 class="text-4xl md:text-5xl font-black mb-4 text-[#FF9AA2] tracking-wider drop-shadow-sm">
                LEVEL C
            </h1>
            <h2 class="text-4xl md:text-5xl font-bold text-gray-700 mb-8 leading-tight">
                C級運動按摩<br>學科測驗
            </h2>
            <div class="bg-white px-6 py-4 rounded-xl shadow-sm mb-12 border-2 border-[#B5EAD7]">
                <p class="text-lg md:text-xl text-gray-500 font-bold mb-1">題庫來源：</p>
                <p class="text-xl md:text-2xl font-black text-[#FF9AA2]">中華民國運動促進協會 官方講義</p>
                <div class="w-full h-0.5 bg-gray-100 my-2"></div>
                <p class="text-sm text-gray-400">隨機抽選 10 題測驗</p>
            </div>
            
            <div class="grid grid-cols-2 gap-4 mb-12 opacity-80">
                <div class="w-12 h-12 rounded-full macaron-green animate-bounce delay-100"></div>
                <div class="w-12 h-12 rounded-full macaron-purple animate-bounce delay-300"></div>
                <div class="w-12 h-12 rounded-full macaron-yellow animate-bounce delay-500"></div>
                <div class="w-12 h-12 rounded-full macaron-blue animate-bounce delay-700"></div>
            </div>

            <button onclick="startQuiz(10)" class="btn-nav text-3xl font-bold text-white bg-[#FFB7B2] hover:bg-[#FF9AA2] px-12 py-6 rounded-full shadow-lg transform hover:-translate-y-1 transition-all duration-300">
                開始測驗
            </button>
        </div>

        <!-- 2. Quiz Screen -->
        <div id="quiz-screen" class="hidden flex-1 flex flex-col p-6 md:p-8 h-full overflow-hidden">
            <div class="flex-1 overflow-y-auto no-scrollbar pb-4">
                <div id="question-text" class="text-2xl md:text-3xl font-bold text-gray-800 mb-6 leading-snug">
                    題目載入中...
                </div>
                
                <!-- Options Container -->
                <div id="options-container" class="space-y-3">
                    <!-- Options will be injected here -->
                </div>
            </div>

            <!-- Navigation Buttons -->
            <div class="flex justify-between items-center mt-4 pt-4 border-t border-gray-100 bg-white z-10">
                <button id="prev-btn" onclick="prevQuestion()" class="btn-nav hidden text-lg font-bold text-gray-600 bg-gray-200 hover:bg-gray-300 px-6 py-3 rounded-xl">
                    上一頁
                </button>
                <div class="flex-1"></div>
                <button id="next-btn" onclick="nextQuestion()" class="btn-nav text-lg font-bold text-white bg-[#B5EAD7] hover:bg-[#A0E8D0] text-gray-700 px-6 py-3 rounded-xl shadow-md">
                    下一頁
                </button>
                <button id="submit-btn" onclick="submitQuiz()" class="btn-nav hidden text-lg font-bold text-white bg-[#FFB7B2] hover:bg-[#FF9AA2] px-6 py-3 rounded-xl shadow-md">
                    繳交試卷
                </button>
            </div>
        </div>

        <!-- 3. Result Screen -->
        <div id="result-screen" class="hidden flex-1 flex flex-col p-8 overflow-y-auto bg-gray-50">
            <div class="text-center mb-10">
                <h2 class="text-4xl font-bold text-gray-800 mb-4">測驗結果</h2>
                <div class="flex justify-center items-center gap-8 mb-6">
                    <div class="bg-white p-6 rounded-2xl shadow-md border-b-4 border-[#FFB7B2]">
                        <p class="text-gray-500 text-sm">得分</p>
                        <p id="score-display" class="text-5xl font-black text-[#FF9AA2]">0</p>
                    </div>
                    <div class="bg-white p-6 rounded-2xl shadow-md border-b-4 border-[#B5EAD7]">
                        <p class="text-gray-500 text-sm">耗時</p>
                        <p id="time-display" class="text-3xl font-bold text-[#7BC5AE]">00:00</p>
                    </div>
                </div>
                <button onclick="restartQuiz()" class="text-xl font-bold text-white bg-[#C7CEEA] hover:bg-[#AAB6E6] px-10 py-3 rounded-full shadow-md transition-colors">
                    回首頁
                </button>
            </div>

            <div class="max-w-3xl mx-auto w-full">
                <h3 class="text-2xl font-bold text-gray-700 mb-6 border-l-8 border-[#FFFFB5] pl-4">詳細解析</h3>
                <div id="review-container" class="space-y-6">
                    <!-- Review items injected here -->
                </div>
            </div>
        </div>

    </div>

    <script>
        // --- Data: Question Bank for Level C Sports Massage ---
        // Derived from the "SMR-C" and "Untitled Design.pdf" content provided
        const coreQuestionBank = [
            {

                ],

                answer: "薦骨 (Sacrum) 的前表面 (S2-S4)",

                answer: "股骨大轉子 (Greater Trochanter) 的頂端上緣",
                explanation: "梨狀肌橫跨骨盆，止於股骨大轉子上緣，因此收縮時能影響髖關節動作。"
            },
            {
                question: "當髖關節處於伸直狀態（如站立）時，梨狀肌的主要功能是？",
                options: [
                    "髖關節外旋 (External Rotation)",
                    "髖關節內旋 (Internal Rotation)",
                    "髖關節屈曲",
                    "髖關節內收"
                ],
                answer: "髖關節外旋 (External Rotation)",
                explanation: "在解剖姿勢下（站立/伸直），梨狀肌是強力的外旋肌。"
            },
            {
                question: "什麼是「臀肌失憶症 (Gluteal Amnesia)」的主要成因？",
                options: [
                    "長期久坐導致臀大肌長期被拉長且無力",
                    "過度深蹲訓練",
                    "梨狀肌過度緊繃",
                    "跑步姿勢不正確"
                ],
                answer: "長期久坐導致臀大肌長期被拉長且無力",
                explanation: "現代人久坐使臀大肌長期處於拉長狀態，導致大腦漸漸「忘記」如何徵召它。"
            },
            {
                question: "當發生臀肌失憶症時，大腦常會改徵召哪一組肌肉來「代班」，形成協同肌主導？",
                options: [
                    "腿後肌群 (Hamstrings) 或下背肌群",
                    "股四頭肌",
                    "腹直肌",
                    "腓腸肌"
                ],
                answer: "腿後肌群 (Hamstrings) 或下背肌群",
                explanation: "這是「協同肌主導 (Synergistic Dominance)」現象，導致腿後肌緊繃或腰痠背痛。"
            },
            {
                question: "在「髖內收測試 (Hip Adduction Test)」中，正常的活動角度約為多少？",
                options: [
                    "20-30 度",
                    "0-10 度",
                    "45-60 度",
                    "90 度以上"
                ],
                answer: "20-30 度",
                explanation: "正常的大腿內收幅度應能越過身體中線約 20-30 度。"
            },
            {
                question: "髖內收測試 (Hip Adduction Test) 主要用來評估哪些組織的緊繃程度？",
                options: [
                    "闊筋膜張肌 (TFL) 與髂脛束 (ITB)",
                    "內收肌群 (Adductors)",
                    "臀大肌",
                    "股四頭肌"
                ],
                answer: "闊筋膜張肌 (TFL) 與髂脛束 (ITB)",
                explanation: "若 TFL 或 ITB 過緊，會限制股骨向內側移動（內收）的角度。"
            },
            {
                question: "進行髖內收測試時，若個案出現「同側骨盆上提 (Hip Hiking)」的代償動作，顯示哪條肌肉過度活躍？",

                    "腰方肌 (QL)",
                    "臀中肌",
                    "腹橫肌",

                explanation: "骨盆上提是腰方肌過度收縮的典型代償，用來假裝腿有掉下去（內收），常伴隨下背痛。"
            },
            {
                question: "梨狀肌症候群常被誤判為坐骨神經痛，是因為？",

                ],
                answer: "坐骨神經從梨狀肌下方或中間穿過，容易受壓迫",
                explanation: "梨狀肌緊繃會夾擠經過的坐骨神經，產生類似椎間盤突出的麻痛感。"
            },
            {
                question: "肌筋膜富含神經末梢，因此被視為身體最大的什麼器官？",
                options: [
                    "感覺器官",
                    "代謝器官",
                    "消化器官",
                    "呼吸器官"
                ],
                answer: "感覺器官",
                explanation: "肌筋膜負責感覺通訊，向大腦回報關於位置、壓力與張力的本體感覺資訊。"
            },
            {
                question: "SMR-C 的全名是？",
                options: [
                    "Scientific Myofascial Release Concept",
                    "Sports Massage Recovery Center",
                    "Super Muscle Relaxation Class",
                    "Systematic Massage Recovery Core"
                ],
                answer: "Scientific Myofascial Release Concept",
                explanation: "即「科學化肌筋膜放鬆技術」。"
            },
            {
                question: "在髖伸直測試 (Hip Extension Test) 中，若腿後肌群過度用力甚至抽筋，這代表？",
                options: [
                    "腿後肌主導代償，臀大肌延遲活化",
                    "臀大肌非常強壯",
                    "股四頭肌無力",
                    "這是正常現象"
                ],
                answer: "腿後肌主導代償，臀大肌延遲活化",
                explanation: "正常的髖伸直應由臀大肌主導。若腿後肌抽筋，代表它過度代償了臀肌的工作。"
            },
            {
                question: "肌筋膜的「結構支撐」功能，包含下列何者？",
                options: [
                    "提供身體形狀，懸吊器官與肌肉",
                    "分解乳酸",
                    "輸送氧氣",
                    "儲存鈣質"
                ],
                answer: "提供身體形狀，懸吊器官與肌肉",

            },
            {
                question: "當髖關節屈曲超過 60-90 度時，梨狀肌的功能會發生改變，轉變為？",
                options: [
                    "外展 (Abduction) 與內旋",
                    "更強的外旋",
                    "單純的屈曲",
                    "完全失去功能"
                ],
                answer: "外展 (Abduction) 與內旋",
                explanation: "這是一個特殊的生物力學現象，坐姿（屈髖）時梨狀肌的功能會與站姿相反。"
            },
            {
                question: "坐骨大孔 (Greater Sciatic Foramen) 被哪一條肌肉分隔成上下兩個空間？",
                options: [
                    "梨狀肌",
                    "臀中肌",
                    "閉孔內肌",
                    "股方肌"
                ],
                answer: "梨狀肌",
                explanation: "梨狀肌橫跨坐骨大孔，是骨盆後側重要的解剖地標。"
            },
            {
                question: "下列何者「不是」造成髖內收測試受限的常見原因？",
                options: [

                    "闊筋膜張肌 (TFL) 緊繃",
                    "髂脛束 (ITB) 緊繃",
                    "臀中肌後纖維緊繃"
                ],
                answer: "內收肌群過緊",
                explanation: "內收肌群過緊會限制「外展」，而非內收。限制內收的通常是外側的組織（TFL/ITB）。"
            },
            {
                question: "在動作評估中，若觀察到「假性活動度」，通常是指？",
                options: [
                    "目標關節未動，但身體利用腰椎或骨盆代償出動作",

                    "肌肉過度柔軟",
                    "神經傳導速度太快"

                answer: "目標關節未動，但身體利用腰椎或骨盆代償出動作",
                explanation: "例如髖伸直不足，改用腰椎過度前凸來假裝腳有抬高，即為假性活動度。"

                    "身體某處的張力可能影響到遠端的部位",
                    "肌肉之間是獨立運作的",
                    "腳底的筋膜與頭部無關",
                    "筋膜切斷後可以再生無痕"
                ],
                answer: "身體某處的張力可能影響到遠端的部位",
                explanation: "因為筋膜是連續網絡，足底筋膜炎可能與小腿甚至頸部的張力有關（解剖列車概念）。"
            },
            {
                question: "關於闊筋膜張肌 (TFL) 的代償，下列何者正確？",
                options: [

                    "主要造成骨盆後傾",
                    "與髂脛束無關"
                ],
                answer: "常導致髖關節在伸直過程中不自覺外轉",
                explanation: "TFL 緊繃常在髖伸直測試中，造成大腿外轉的代償模式。"
            },

                answer: "先放鬆緊繃的拮抗肌（如髂腰肌），再啟動臀肌",

            {

                options: [

                ],
                answer: "骨折、開放性傷口或深層靜脈栓塞",
                explanation: "急性創傷與血管病變是絕對禁忌。"
            },
            {
                question: "肌內膜 (Endomysium) 是包覆在什麼構造外層的筋膜？",
                options: [
                    "單一肌纖維 (Muscle Fiber)",
                    "整塊肌肉",
                    "肌束",
                    "骨骼"
                ],
                answer: "單一肌纖維 (Muscle Fiber)",
                explanation: "肌外膜包肌肉，肌束膜包肌束，肌內膜包肌纖維。"
            },
            {
                question: "腰椎側屈 (Lumbar Side-bending) 常常伴隨髖內收測試出現，這是為了代償？",
                options: [
                    "髖關節內收角度不足",
                    "膝蓋無法伸直",
                    "腳踝活動度不足",
                    "頸部僵硬"
                ],
                answer: "髖關節內收角度不足",
                explanation: "當腳放不下去（內收受限），身體會側彎（骨盆上提）讓腳看起來好像有下去。"

        ];

        // --- Expansion Logic (To reach 200 items in system) ---
        let questionBank = [...coreQuestionBank];
        while (questionBank.length < 200) {
            questionBank = questionBank.concat(coreQuestionBank.map(q => ({...q})));
        }
        if (questionBank.length > 200) questionBank = questionBank.slice(0, 200);

        // --- App Logic ---
        let currentQuestions = [];
        let currentQuestionIndex = 0;
        let userAnswers = [];
        let timerInterval;
        let secondsElapsed = 0;

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function startQuiz(numQuestions = 10) {
            currentQuestionIndex = 0;
            userAnswers = [];
            secondsElapsed = 0;
            
            // Deep copy and shuffle
            const fullBankCopy = JSON.parse(JSON.stringify(questionBank));
            const shuffledBank = shuffleArray(fullBankCopy);
            
            currentQuestions = shuffledBank.slice(0, numQuestions).map(q => {
                return {
                    ...q,
                    options: shuffleArray([...q.options])
                };
            });

            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('quiz-screen').classList.remove('hidden');
            document.getElementById('quiz-screen').classList.add('flex');
            document.getElementById('quiz-header').classList.remove('hidden');
            document.getElementById('result-screen').classList.add('hidden');

            document.getElementById('total-question-num').innerText = currentQuestions.length;
            startTimer();
            renderQuestion();
        }

        function startTimer() {
            clearInterval(timerInterval);
            document.getElementById('timer').innerText = "00:00";
            timerInterval = setInterval(() => {
                secondsElapsed++;
                const mins = Math.floor(secondsElapsed / 60).toString().padStart(2, '0');
                const secs = (secondsElapsed % 60).toString().padStart(2, '0');
                document.getElementById('timer').innerText = `${mins}:${secs}`;
            }, 1000);
        }

        function renderQuestion() {
            const q = currentQuestions[currentQuestionIndex];
            document.getElementById('current-question-num').innerText = currentQuestionIndex + 1;
            document.getElementById('question-text').innerText = q.question;
            const container = document.getElementById('options-container');
            container.innerHTML = '';

            q.options.forEach(opt => {
                const btn = document.createElement('div');
                btn.className = `option-card w-full p-4 mb-3 rounded-2xl bg-white shadow-sm hover:bg-gray-50 flex items-center gap-4 text-lg md:text-xl font-medium text-gray-600`;
                
                const existingAnswer = userAnswers[currentQuestionIndex];
                if (existingAnswer === opt) {
                    btn.classList.add('selected');
                }

                btn.innerHTML = `
                    <div class="w-6 h-6 md:w-8 md:h-8 rounded-full border-2 border-gray-300 flex-shrink-0 flex items-center justify-center transition-colors">
                        <div class="w-3 h-3 md:w-4 md:h-4 rounded-full bg-[#FF9AA2] ${existingAnswer === opt ? '' : 'hidden'} check-mark"></div>
                    </div>
                    <span class="leading-normal">${opt}</span>
                `;

                btn.onclick = () => selectOption(btn, opt);
                container.appendChild(btn);
            });

            document.getElementById('prev-btn').classList.toggle('hidden', currentQuestionIndex === 0);
            const isLast = currentQuestionIndex === currentQuestions.length - 1;
            document.getElementById('next-btn').classList.toggle('hidden', isLast);
            document.getElementById('submit-btn').classList.toggle('hidden', !isLast);
        }

        function selectOption(btnElement, optionText) {
            const allOpts = document.querySelectorAll('.option-card');
            allOpts.forEach(el => {
                el.classList.remove('selected');
                el.querySelector('.check-mark').classList.add('hidden');
                el.querySelector('.rounded-full.border-2').classList.remove('border-[#FF9AA2]');
            });

            btnElement.classList.add('selected');
            btnElement.querySelector('.check-mark').classList.remove('hidden');
            btnElement.querySelector('.rounded-full.border-2').classList.add('border-[#FF9AA2]');
            userAnswers[currentQuestionIndex] = optionText;
        }

        function nextQuestion() {
            if (currentQuestionIndex < currentQuestions.length - 1) {
                currentQuestionIndex++;
                renderQuestion();
            }
        }

        function prevQuestion() {
            if (currentQuestionIndex > 0) {
                currentQuestionIndex--;
                renderQuestion();
            }
        }

        function submitQuiz() {
            clearInterval(timerInterval);
            showResults();
        }

        function showResults() {
            document.getElementById('quiz-screen').classList.add('hidden');
            document.getElementById('quiz-header').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');

            let score = 0;
            const reviewContainer = document.getElementById('review-container');
            reviewContainer.innerHTML = '';

            currentQuestions.forEach((q, idx) => {
                const userAns = userAnswers[idx];
                const isCorrect = userAns === q.answer;
                if (isCorrect) score += (100 / currentQuestions.length);

                const reviewItem = document.createElement('div');
                reviewItem.className = "bg-white p-6 rounded-3xl shadow-sm border border-gray-100";
                
                reviewItem.innerHTML = `
                    <div class="flex items-start gap-4 mb-4">
                        <span class="bg-${isCorrect ? '[#B5EAD7]' : '[#FFB7B2]'} text-${isCorrect ? 'green' : 'red'}-700 px-3 py-1 rounded-lg font-bold text-sm whitespace-nowrap mt-1">
                            ${isCorrect ? '正確' : '錯誤'}
                        </span>
                        <h4 class="text-xl font-bold text-gray-800 leading-normal">Q${idx + 1}. ${q.question}</h4>
                    </div>
                    <div class="space-y-2 mb-4 pl-2 md:pl-14">
                        <div class="flex items-center gap-2 ${isCorrect ? 'text-green-600 font-bold' : 'text-red-500 line-through decoration-2'}">
                            <span class="text-sm text-gray-400">您的答案：</span>
                            <span>${userAns || "未作答"}</span>
                        </div>
                        ${!isCorrect ? `
                        <div class="flex items-center gap-2 text-green-600 font-bold">
                            <span class="text-sm text-gray-400">正確答案：</span>
                            <span>${q.answer}</span>
                        </div>
                        ` : ''}
                    </div>
                    <div class="bg-yellow-50 p-4 rounded-xl text-gray-600 text-base leading-relaxed border-l-4 border-[#FFFFB5] ml-0 md:ml-14">
                        <span class="font-bold text-gray-500">解析：</span>${q.explanation}
                    </div>
                `;
                reviewContainer.appendChild(reviewItem);
            });

            document.getElementById('score-display').innerText = Math.round(score);
            const mins = Math.floor(secondsElapsed / 60).toString().padStart(2, '0');
            const secs = (secondsElapsed % 60).toString().padStart(2, '0');
            document.getElementById('time-display').innerText = `${mins}:${secs}`;
        }

        function restartQuiz() {
            document.getElementById('result-screen').classList.add('hidden');
            document.getElementById('start-screen').classList.remove('hidden');
        }
    </script>
</body>
</html>
